spec:
  inputs:
    scope:
      description: "Scope du patch: group ou project"
      type: string
      default: "group"
      options: ["group", "project"]

    envs:
      description: "Environnements ciblés"
      type: string
      default: "all"
      options:
        - "all"
        - "dev"
        - "int"
        - "qua"
        - "prod"
        - "prd"
        - "qualiso"
        - "dev,int"
        - "dev,qua"
        - "dev,prod"
        - "dev,prd"
        - "int,qua"
        - "qua,prod"
        - "qua,prd"
        - "dev,int,qua"
        - "dev,int,qua,prod"
        - "dev,int,qua,prd"
        - "dev,int,qua,prod,qualiso"

    group_id:
      description: "Group ID si scope=group (vide = prend config.yaml)"
      type: string
      default: ""

    project_path:
      description: "Project path si scope=project (ex: dsk-lab/dm)"
      type: string
      default: ""

    project_id:
      description: "Project ID si scope=project (optionnel, remplace project_path)"
      type: string
      default: ""

    branch_prefix:
      description: "Préfixe de branche (ex: sec/patch)"
      type: string
      default: "sec/patch"

---
stages:
  - validate
  - report
  - apply

workflow:
  rules:
    - when: always

variables:
  BOT_CONFIG: "config.yaml"

  # Inputs -> variables d'environnement pour patch_bot.py
  SCOPE: $[[ inputs.scope ]]
  ENVS: $[[ inputs.envs ]]
  GROUP_ID: $[[ inputs.group_id ]]
  PROJECT_PATH: $[[ inputs.project_path ]]
  PROJECT_ID: $[[ inputs.project_id ]]
  BRANCH_PREFIX: $[[ inputs.branch_prefix ]]

.before_script_ca: &before_script_ca
  - |
    echo "== Effective parameters (from pipeline inputs) =="
    echo "BOT_CONFIG=$BOT_CONFIG"
    echo "SCOPE=$SCOPE"
    echo "GROUP_ID=$GROUP_ID"
    echo "PROJECT_PATH=$PROJECT_PATH"
    echo "PROJECT_ID=$PROJECT_ID"
    echo "ENVS=$ENVS"
    echo "BRANCH_PREFIX=$BRANCH_PREFIX"

.setup_python: &setup_python
  - |
    mkdir -p pip
    cat > pip/pip.conf <<EOF
    [global]
    index-url = 
    cert =
    timeout = 600
    retries = 2
    EOF
  - export PIP_CONFIG_FILE=pip/pip.conf
  - python3 --version
  - python3 -m pip config list
  - python3 -m pip install --upgrade pip
  - python3 -m pip install -r requirements.txt

validate-inputs:
  stage: validate
  image: image-registry:1.4.0
  when: manual
  before_script:
    - *setup_python
  script:
    - *before_script_ca
    - |
      echo "== Validate inputs =="

      case "$SCOPE" in
        group|project) ;;
        *)
          echo "ERROR: SCOPE must be group|project"
          exit 2
          ;;
      esac

      case "$ENVS" in
        all|dev|int|qua|prod|prd|qualiso|\
        dev,int|dev,qua|dev,prod|dev,prd|\
        int,qua|qua,prod|qua,prd|\
        dev,int,qua|dev,int,qua,prod|dev,int,qua,prd|dev,int,qua,prod,qualiso)
          ;;
        *)
          echo "ERROR: ENVS invalid."
          echo "Allowed examples: all / dev / int / qua / prod / prd / qualiso / dev,int / dev,int,qua ..."
          exit 2
          ;;
      esac

      if [ "$SCOPE" = "project" ]; then
        if [ -z "${PROJECT_ID:-}" ] && [ -z "${PROJECT_PATH:-}" ]; then
          echo "ERROR: SCOPE=project requires PROJECT_ID or PROJECT_PATH"
          exit 2
        fi
      fi

      echo "OK: inputs valid"

security-report:
  stage: report
  image: image-registry:1.4.0
  needs: ["validate-inputs"]
  when: manual
  before_script:
    - *setup_python
  script:
    - *before_script_ca
    - echo "== SECURITY REPORT MODE (dry-run) =="
    - export DRY_RUN=true
    - python patch_bot.py --config "$BOT_CONFIG"
  artifacts:
    when: always
    paths:
      - report.txt
    expire_in: 30 days

security-apply:
  stage: apply
  image: image-registry:1.4.0
  needs: ["validate-inputs"]
  when: manual
  before_script:
    - *setup_python
  script:
    - *before_script_ca
    - echo "== SECURITY APPLY MODE (create MR) =="
    - export DRY_RUN=false
    - python patch_bot.py --config "$BOT_CONFIG"
  artifacts:
    when: always
    paths:
      - report.txt
    expire_in: 30 days
